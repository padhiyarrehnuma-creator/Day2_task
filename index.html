<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="form-box">

        <h2>Registration Form</h2>

        <form action="#">

            <label for="fullname">Full Name</label>
            <input
                type="text"
                id="fullname"
                placeholder="Enter your full name"
                required
            >

            <label for="email">Email Address</label>
            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required
            >

            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                placeholder="Enter your password"
                required
            >

            <label>Gender</label>

            <div class="gender">

                <label class="radio">
                    <input
                        type="radio"
                        name="gender"
                        value="Male"
                    >
                    Male
                </label>

                <label class="radio">
                    <input
                        type="radio"
                        name="gender"
                        value="Female"
                    >
                    Female
                </label>

                <label class="radio">
                    <input
                        type="radio"
                        name="gender"
                        value="Other"
                    >
                    Other
                </label>

            </div>

            <label for="course">Course / Interest</label>

            <select id="course">

                <option selected disabled>
                    Select your interest
                </option>

                <option>
                    Frontend Development
                </option>

                <option>
                    Backend Development
                </option>

                <option>
                    Full Stack Development
                </option>

                <option>
                    UI / UX Design
                </option>

                <option>
                    Web Development
                </option>

            </select>

            <button type="submit">
                Submit
            </button>

        </form>

    </div>

</div>

</body>
</html>
